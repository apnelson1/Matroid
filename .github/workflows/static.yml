name: Doc-gen deployment

# docgen-action deploy steps only run on `push` (not `schedule`).
#
# Deploy only when someone pushes to `main` *and* the actor matches:
# - repository variable `DOCGEN_DEPLOY_ACTOR` if set (Settings → Secrets and variables → Actions → Variables), otherwise
# - `github.repository_owner` (the repo owner account).
#
# Other people's pushes to `main`, or any push on another branch, are skipped for this workflow.
on:
  push:
    branches: [main]

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read # Read access to repository contents
  id-token: write # Required to upload the site to GitHub Pages
  pages: write # Write access to GitHub Pages

jobs:
  build:
    if: github.actor == (vars.DOCGEN_DEPLOY_ACTOR != '' && vars.DOCGEN_DEPLOY_ACTOR || github.repository_owner)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout project
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0 # Fetch all history for all branches and tags

      - name: Build and lint the project.
        id: build-lean
        uses: leanprover/lean-action@f807b338d95de7813c5c50d018f1c23c9b93b4ec # v1.2.0

      - name: Build project documentation.
        id: build-docgen
        uses: leanprover-community/docgen-action@main
        with:
          deploy: false
          build-page: false
          # The doc cache can replay a stale top-level docs facet without the Matroid HTML pages.
          use-github-cache: false
          # Uncomment the next line if you wish to build a blueprint alongside your repository.
          # blueprint: true

      - name: Check generated Matroid docs.
        if: github.event_name == 'push'
        run: |
          echo "::group::agent docgen diagnostics"
          target="docs/docs/Matroid/Graph/Planarity/Realization/Basic.html"
          if [ -f "$target" ]; then
            target_exists=true
          else
            target_exists=false
          fi
          printf '{"sessionId":"06e552","runId":"post-workflow-change","hypothesisId":"H4","location":".github/workflows/static.yml","message":"docgen artifact contains target module","data":{"target":"%s","target_exists":%s},"timestamp":%s}\n' "$target" "$target_exists" "$(date +%s%3N)"
          if [ "$target_exists" != true ]; then
            echo "::error::Missing expected generated documentation page: $target"
            echo "::endgroup::"
            exit 1
          fi
          echo "::endgroup::"

      - name: Upload documentation artifact.
        if: github.event_name == 'push'
        uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3.0.1
        with:
          path: docs/

      - name: Deploy to GitHub Pages.
        if: github.event_name == 'push'
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4.0.5
